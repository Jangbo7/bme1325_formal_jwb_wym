services:
  mysql:
    image: mariadb:11
    container_name: openemr_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql

  openemr:
    image: openemr/openemr:8.0.0
    container_name: openemr_app
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: rootpass
      MYSQL_USER: openemr
      MYSQL_PASS: openemrpass
      MYSQL_DATABASE: openemr
      OE_USER: admin
      OE_PASS: pass
    volumes:
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites
      - openemr_ssl:/etc/ssl
      - openemr_letsencrypt:/etc/letsencrypt
    depends_on:
      - mysql

volumes:
  db_data:
  openemr_sites:
  openemr_ssl:
  openemr_letsencrypt: