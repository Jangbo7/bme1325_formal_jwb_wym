<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Sandbox Pseudo 3D Prototype</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="hud">
    <div class="hud__title">Hospital Pseudo 3D</div>
    <div class="hud__tips">Move: WASD / Arrows, stairs switch floor, E submit triage at desk</div>
    <div class="hud__floor">
      <span id="floor-state">Current Floor: 1F</span>
    </div>
  </div>
  <canvas id="game" width="1280" height="720" aria-label="third person pseudo 3d hospital sandbox"></canvas>

  <div id="triageModal" class="triage-modal hidden" aria-hidden="true">
    <div class="triage-modal__content" role="dialog" aria-modal="true" aria-labelledby="triageModalTitle">
      <h2 id="triageModalTitle">分诊登记</h2>
      <form id="triageForm" class="triage-form">
        <fieldset>
          <label for="symptoms">症状描述</label>
          <textarea id="symptoms" placeholder="例如：头晕、胸闷、咳嗽" required></textarea>
        </fieldset>

        <fieldset>
          <label for="temp_c">体温 (°C)</label>
          <input id="temp_c" type="number" min="35" max="42" step="0.1" value="37.8" required />
        </fieldset>

        <fieldset>
          <label for="heart_rate">心率 (次/分)</label>
          <input id="heart_rate" type="number" min="40" max="180" value="105" required />
        </fieldset>

        <fieldset>
          <label for="systolic_bp">收缩压 (mmHg)</label>
          <input id="systolic_bp" type="number" min="70" max="220" value="132" required />
        </fieldset>

        <fieldset>
          <label for="diastolic_bp">舒张压 (mmHg)</label>
          <input id="diastolic_bp" type="number" min="40" max="140" value="86" required />
        </fieldset>

        <fieldset>
          <label for="pain_score">疼痛等级 (0-10) <span id="painDisplay">5</span></label>
          <input id="pain_score" type="range" min="0" max="10" value="5" />
        </fieldset>

        <div class="triage-form__actions">
          <button type="button" id="triageCancelBtn" class="triage-btn triage-btn--ghost">取消</button>
          <button type="submit" class="triage-btn triage-btn--primary">提交分诊</button>
        </div>
      </form>
    </div>
  </div>

  <div id="triageDialogueModal" class="triage-modal hidden" aria-hidden="true">
    <div class="triage-modal__content triage-dialogue" role="dialog" aria-modal="true" aria-labelledby="triageDialogueTitle">
      <div class="triage-dialogue__header">
        <div>
          <h2 id="triageDialogueTitle">分诊对话</h2>
          <p id="triageDialogueStatus" class="triage-dialogue__status">分诊信息已提交，正在等待智能分诊建议。</p>
        </div>
        <button type="button" id="triageDialogueCloseBtn" class="triage-btn triage-btn--ghost">关闭</button>
      </div>

      <div id="triageDialogueMeta" class="triage-dialogue__meta">
        <span id="triageLevelBadge" class="triage-badge">分级待定</span>
        <span id="triageDeptBadge" class="triage-badge triage-badge--muted">科室待定</span>
      </div>

      <div id="triageDialogueMessages" class="triage-dialogue__messages" aria-live="polite"></div>

      <div class="triage-dialogue__footer">
        <div id="triageEvidenceList" class="triage-dialogue__evidence"></div>
        <form id="triageDialogueForm" class="triage-dialogue__composer">
          <textarea id="triageDialogueInput" placeholder="在这里回复分诊 agent，例如：症状是半小时前开始的，没有过敏，疼痛 6 分。"></textarea>
          <button type="submit" id="triageDialogueSendBtn" class="triage-btn triage-btn--primary">发送</button>
        </form>
      </div>
    </div>
  </div>

  <script src="./api.private.js"></script>
  <script src="./main.js"></script>
</body>
</html>
