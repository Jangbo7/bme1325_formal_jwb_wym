<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stardew Valley Hospital</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="location-info">
        <span id="current-room">大厅</span>
      </div>
      <button id="api-settings-btn" type="button">API 设置</button>
    </div>

    <div id="interaction-prompt" class="hidden">
      <span id="prompt-text">按 E 交互</span>
    </div>

    <div id="dialogue-box" class="hidden">
      <div id="dialogue-portrait"></div>
      <div id="dialogue-content">
        <div id="dialogue-name"></div>
        <div id="dialogue-text"></div>
      </div>
      <div id="dialogue-options"></div>
    </div>

    <div id="input-modal" class="hidden">
      <div id="input-modal-card">
        <div id="input-modal-title">请输入内容</div>
        <textarea id="input-modal-field" rows="4"></textarea>
        <div id="input-modal-actions">
          <button id="input-modal-cancel" type="button">取消</button>
          <button id="input-modal-confirm" type="button">确认</button>
        </div>
      </div>
    </div>

    <div id="npc-panel-shell" class="panel-shell">
      <button id="npc-panel-toggle" class="panel-toggle" type="button" aria-expanded="false" aria-controls="npc-panel">人物</button>
      <div id="npc-panel" class="drawer-panel" aria-hidden="true">
        <div class="panel-title">医院里的人</div>
        <div id="npc-list"></div>
      </div>
    </div>

    <div id="menu-panel" class="hidden">
      <div class="panel-title">菜单</div>
      <div id="menu-options"></div>
    </div>

    <div id="status-panel-shell" class="panel-shell">
      <button id="status-toggle" class="status-toggle" type="button" aria-expanded="false" aria-controls="status-popover">
        <span id="status-toggle-icon" aria-hidden="true">☀</span>
        <span class="sr-only">状态</span>
      </button>
      <div id="status-popover" class="status-popover" aria-hidden="true">
        <div class="panel-title">状态</div>
        <div class="status-row">
          <span class="status-label">时间</span>
          <span id="time-display">第1天 - 上午 9:00</span>
        </div>
        <div class="status-row">
          <span class="status-label">天气</span>
          <span id="weather-display">☀ 晴天</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
